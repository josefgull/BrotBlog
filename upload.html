---
layout: default
title: Bild hochladen
permalink: /upload/
---
<meta charset="utf-8">

<style>
  .upload-container {
    max-width: 600px;
    margin: 2rem auto;
    font-family: inherit;
  }
  .upload-container h1 {
    margin-bottom: 1.5rem;
  }
  .form-group {
    margin-bottom: 1rem;
  }
  .form-group label {
    display: block;
    font-weight: bold;
    margin-bottom: 0.3rem;
  }
  .form-group input[type="text"],
  .form-group input[type="password"],
  .form-group input[type="file"] {
    width: 100%;
    padding: 0.5rem;
    box-sizing: border-box;
    border: 1px solid #ccc;
    border-radius: 4px;
  }
  .btn {
    background: #333;
    color: #fff;
    border: none;
    padding: 0.6rem 1.4rem;
    border-radius: 4px;
    cursor: pointer;
    font-size: 1rem;
  }
  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  #preview {
    max-width: 100%;
    margin-top: 1rem;
    display: none;
    border: 1px solid #ccc;
    border-radius: 4px;
  }
  #status {
    margin-top: 1rem;
    padding: 0.6rem;
    border-radius: 4px;
    display: none;
  }
  #status.success { background: #d4edda; color: #155724; }
  #status.error   { background: #f8d7da; color: #721c24; }
  .hint {
    font-size: 0.85rem;
    color: #666;
    margin-top: 0.2rem;
  }
</style>

<div class="upload-container">
  <h1>Bild hochladen</h1>

  <div class="form-group">
    <label for="token">GitHub Personal Access Token</label>
    <input type="password" id="token" placeholder="ghp_..." autocomplete="one-time-code">
    <p class="hint">
      Benötigt <code>contents: write</code> Berechtigung.
      <a href="https://github.com/settings/tokens/new?scopes=repo&description=BrotBlog+Upload" target="_blank" rel="noopener">Token erstellen</a>
    </p>
  </div>

  <div class="form-group">
    <label for="folder">Ordner (z.B. <code>post2</code>)</label>
    <input type="text" id="folder" placeholder="post2">
    <p class="hint">Wird unter <code>assets/images/</code> angelegt.</p>
  </div>

  <div class="form-group">
    <label for="file">Bilddatei auswählen</label>
    <input type="file" id="file" accept="image/*">
  </div>

  <img id="preview" alt="Vorschau">

  <div class="form-group" style="margin-top:1rem;">
    <button class="btn" id="uploadBtn" disabled>Hochladen</button>
  </div>

  <div id="status"></div>

  <div id="result" style="display:none; margin-top:1rem;">
    <strong>Markdown-Snippet:</strong>
    <pre id="snippet" style="background:#f4f4f4; padding:0.5rem; border-radius:4px; overflow-x:auto;"></pre>
  </div>
</div>

<script>
(function () {
  var OWNER = "josefgull";
  var REPO  = "BrotBlog";
  var BRANCH = "main";

  var tokenInput  = document.getElementById("token");
  var folderInput = document.getElementById("folder");
  var fileInput   = document.getElementById("file");
  var preview     = document.getElementById("preview");
  var uploadBtn   = document.getElementById("uploadBtn");
  var statusEl    = document.getElementById("status");
  var resultEl    = document.getElementById("result");
  var snippetEl   = document.getElementById("snippet");

  function checkReady() {
    uploadBtn.disabled = !(tokenInput.value.trim() && folderInput.value.trim() && fileInput.files.length);
  }

  tokenInput.addEventListener("input", checkReady);
  folderInput.addEventListener("input", checkReady);

  fileInput.addEventListener("change", function () {
    checkReady();
    var file = fileInput.files[0];
    if (!file) { preview.style.display = "none"; return; }
    var reader = new FileReader();
    reader.onload = function (e) {
      preview.src = e.target.result;
      preview.style.display = "block";
    };
    reader.readAsDataURL(file);
  });

  uploadBtn.addEventListener("click", function () {
    var token  = tokenInput.value.trim();
    var folder = folderInput.value.trim().replace(/^\/+|\/+$/g, "");
    var file   = fileInput.files[0];

    if (!token || !folder || !file) return;

    // Reject path traversal or unsafe characters in folder/filename
    if (/[^a-zA-Z0-9_\-]/.test(folder) || folder.indexOf("..") !== -1) {
      setStatus("Fehler: Ordnername enthält ungültige Zeichen.", "error");
      return;
    }
    var safeFilename = file.name.replace(/[^a-zA-Z0-9_\-\.]/g, "_");
    if (safeFilename.indexOf("..") !== -1) {
      setStatus("Fehler: Dateiname enthält ungültige Zeichen.", "error");
      return;
    }

    uploadBtn.disabled = true;
    setStatus("", "");

    var reader = new FileReader();
    reader.onload = function (e) {
      // e.target.result is a data URL; extract base64 content
      var base64 = e.target.result.split(",")[1];
      var filename = safeFilename;
      var path = "assets/images/" + folder + "/" + filename;
      var apiUrl = "https://api.github.com/repos/" + OWNER + "/" + REPO + "/contents/" + path;

      // Check whether file already exists (to get its SHA for updates)
      fetch(apiUrl, {
        headers: {
          "Authorization": "Bearer " + token,
          "Accept": "application/vnd.github+json"
        }
      })
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (existing) {
        var body = {
          message: "Bild hochladen: " + path,
          content: base64,
          branch: BRANCH
        };
        if (existing && existing.sha) {
          body.sha = existing.sha;
        }
        return fetch(apiUrl, {
          method: "PUT",
          headers: {
            "Authorization": "Bearer " + token,
            "Accept": "application/vnd.github+json",
            "Content-Type": "application/json"
          },
          body: JSON.stringify(body)
        });
      })
      .then(function (r) {
        if (!r.ok) {
          return r.json().then(function (err) {
            throw new Error(err.message || "Upload fehlgeschlagen");
          });
        }
        return r.json();
      })
      .then(function () {
        var mdPath = "{{ site.baseurl }}/assets/images/" + folder + "/" + safeFilename;
        var snippet = "![](" + mdPath + ")";
        snippetEl.textContent = snippet;
        resultEl.style.display = "block";
        setStatus("✓ Bild erfolgreich hochgeladen!", "success");
      })
      .catch(function (err) {
        setStatus("Fehler: " + err.message, "error");
      })
      .finally(function () {
        uploadBtn.disabled = false;
      });
    };
    reader.readAsDataURL(file);
  });

  function setStatus(msg, type) {
    statusEl.textContent = msg;
    statusEl.className = type;
    statusEl.style.display = msg ? "block" : "none";
  }
})();
</script>
