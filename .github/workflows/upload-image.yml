name: Upload Image

on:
  workflow_dispatch:
    inputs:
      image_url:
        description: 'URL of the image to upload'
        required: true
        type: string
      post_folder:
        description: 'Post folder name inside assets/images/ (e.g. post2)'
        required: true
        type: string
      image_name:
        description: 'Filename for the saved image (e.g. brot.jpeg)'
        required: true
        type: string

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create post image folder
        run: mkdir -p "assets/images/${{ github.event.inputs.post_folder }}"

      - name: Download image
        run: |
          curl -L -o "assets/images/${{ github.event.inputs.post_folder }}/${{ github.event.inputs.image_name }}" \
            "${{ github.event.inputs.image_url }}"

      - name: Commit and push image
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "assets/images/${{ github.event.inputs.post_folder }}/${{ github.event.inputs.image_name }}"
          git commit -m "Add image: ${{ github.event.inputs.post_folder }}/${{ github.event.inputs.image_name }}"
          git push
